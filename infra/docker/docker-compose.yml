version: "3.9"

name: personal-cloud-platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pcp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-pcp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pcp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pcp-network

  redis:
    image: redis:7-alpine
    container_name: pcp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pcp-network

  minio:
    image: minio/minio:latest
    container_name: pcp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pcp-network

  traefik:
    image: traefik:v3.0
    container_name: pcp-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pcp-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pcp-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - pcp-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  pcp-network:
    driver: bridge