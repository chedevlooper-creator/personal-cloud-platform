name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgres://pcp:pcp@localhost:5432/pcp_test
      SESSION_SECRET: ci-session-secret-not-used-in-prod-32b
      JWT_SECRET: ci-jwt-secret-not-used-in-prod-32bytes
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
